<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Кликер | Регистрация и Лидеры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --surface2:  #1e2a3a;
      --border:    #1f3050;
      --primary:   #3b82f6;
      --primary-d: #2563eb;
      --accent:    #f59e0b;
      --accent-d:  #d97706;
      --success:   #10b981;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --glow:      rgba(59,130,246,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-x pan-y;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    /* Модальное окно авторизации */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px 28px;
      width: min(380px, 90vw);
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }
    .modal-content h2 {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .modal-content p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--primary); }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-btn {
      flex: 1;
      background: var(--primary);
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.1s;
    }
    .modal-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
    }
    .modal-btn:hover { opacity: 0.85; transform: scale(0.98); }
    .error-msg {
      color: #f87171;
      font-size: 0.75rem;
      margin-top: -12px;
      margin-bottom: 16px;
    }
    .auth-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.1s;
    }
    .auth-tab.active {
      background: var(--primary);
      color: white;
    }
    .auth-tab:not(.active) {
      background: var(--surface2);
      color: var(--muted);
    }

    /* Основной контейнер игры (скрыт до входа) */
    #gameContainer {
      width: 100%;
      max-width: 1200px;
      display: none;
      position: relative;
      z-index: 1;
    }

    .userbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }
    .username-badge {
      background: var(--primary);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(59,130,246,0.3);
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    @media (max-width: 850px) {
      .layout { grid-template-columns: 1fr; }
    }
    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px 20px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .stat-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      transition: transform .1s;
    }
    .stat-value.bump {
      transform: scale(1.15);
      color: var(--accent);
    }
    .click-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .click-btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 35% 35%, #4fa3ff, var(--primary-d));
      box-shadow:
        0 0 0 8px rgba(59,130,246,.15),
        0 0 0 16px rgba(59,130,246,.08),
        0 20px 60px rgba(59,130,246,.35),
        inset 0 -4px 12px rgba(0,0,0,.4),
        inset 0 4px 12px rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      transition: transform .08s, box-shadow .08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }
    .click-btn::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 20%;
      width: 40%;
      height: 30%;
      background: radial-gradient(ellipse, rgba(255,255,255,.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .click-btn:active {
      transform: scale(.92);
      box-shadow:
        0 0 0 4px rgba(59,130,246,.2),
        0 8px 30px rgba(59,130,246,.25),
        inset 0 4px 16px rgba(0,0,0,.5),
        inset 0 -2px 8px rgba(255,255,255,.08);
    }
    .click-btn:hover:not(:active) {
      transform: scale(1.04);
      box-shadow:
        0 0 0 10px rgba(59,130,246,.2),
        0 0 0 20px rgba(59,130,246,.1),
        0 24px 70px rgba(59,130,246,.45),
        inset 0 -4px 12px rgba(0,0,0,.4),
        inset 0 4px 12px rgba(255,255,255,.2);
    }
    .multiplier-badge {
      position: absolute;
      top: -12px;
      right: -12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-d));
      color: #000;
      font-size: .8rem;
      font-weight: 900;
      padding: 5px 10px;
      border-radius: 999px;
      display: none;
      animation: pop .2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .multiplier-badge.visible { display: block; }
    .particle {
      position: fixed;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent);
      pointer-events: none;
      animation: float-up 0.8s ease forwards;
      z-index: 999;
      text-shadow: 0 0 3px black;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(.5); }
    }
    .progress-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }
    .progress-bar {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width .3s ease;
      box-shadow: 0 0 10px var(--glow);
    }
    .progress-label {
      font-size: .7rem;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }
    .shop {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .shop-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .upgrade-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s, background .2s, transform .1s;
      text-align: left;
      width: 100%;
      color: var(--text);
      touch-action: manipulation;
    }
    .upgrade-btn:hover:not(.disabled) {
      border-color: var(--primary);
      background: var(--surface2);
      transform: translateX(4px);
    }
    .upgrade-btn:active:not(.disabled) {
      transform: translateX(2px);
    }
    .upgrade-btn.disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .upgrade-btn.affordable {
      border-color: rgba(59,130,246,.6);
      box-shadow: 0 0 12px rgba(59,130,246,.2);
    }
    .upg-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .upg-info { flex: 1; }
    .upg-name {
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .upg-desc {
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .upg-cost {
      font-size: .78rem;
      font-weight: 700;
      color: var(--accent);
    }
    .upg-count {
      font-size: .75rem;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: 3px 10px;
      flex-shrink: 0;
    }
    .achievements {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .achievement {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 12px;
      font-size: .7rem;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: .4;
      transition: opacity .4s, border-color .4s;
    }
    .achievement.unlocked {
      opacity: 1;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(245,158,11,.2);
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0%   { transform: scale(.8); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .leaderboard {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 0;
    }
    .leaderboard-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .refresh-leaderboard {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .7rem;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
    }
    .leaderboard-table {
      width: 100%;
      padding: 8px 0;
    }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      font-size: .85rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .leaderboard-rank {
      width: 36px;
      font-weight: 700;
      color: var(--accent);
    }
    .leaderboard-name {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 12px;
    }
    .leaderboard-score {
      font-weight: 700;
      font-family: monospace;
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 30px;
    }
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 16px;
      font-size: .9rem;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      z-index: 1000;
      transition: transform .3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .chat-section {
      width: 100%;
      max-width: 1200px;
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }
    .chat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .chat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .chat-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    .chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn .2s;
    }
    .chat-msg.own { flex-direction: row-reverse; }
    .chat-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 900;
      flex-shrink: 0;
      background: var(--primary);
    }
    .chat-bubble-wrap { max-width: 75%; }
    .chat-meta {
      font-size: .65rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .chat-msg.own .chat-meta { text-align: right; }
    .chat-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px 14px;
      font-size: .85rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-msg.own .chat-bubble {
      background: rgba(59,130,246,.2);
      border-color: rgba(59,130,246,.4);
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      padding: 10px 14px;
      outline: none;
    }
    .chat-input:focus { border-color: var(--primary); }
    .chat-send {
      background: var(--primary);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      transition: 0.1s;
    }
    .chat-send:active { transform: scale(0.95); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="authModal" class="modal active">
  <div class="modal-content">
    <h2>Добро пожаловать</h2>
    <p>Войдите или зарегистрируйтесь, чтобы играть</p>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Вход</div>
      <div class="auth-tab" data-tab="register">Регистрация</div>
    </div>
    <div id="loginForm">
      <input type="text" id="loginUsername" class="modal-input" placeholder="Имя пользователя" autocomplete="off">
      <input type="password" id="loginPassword" class="modal-input" placeholder="Пароль">
      <div id="loginError" class="error-msg"></div>
      <button id="doLogin" class="modal-btn">Войти</button>
    </div>
    <div id="registerForm" style="display: none;">
      <input type="text" id="regUsername" class="modal-input" placeholder="Имя (3-30 символов)" autocomplete="off">
      <input type="password" id="regPassword" class="modal-input" placeholder="Пароль (мин. 4)">
      <div id="regError" class="error-msg"></div>
      <button id="doRegister" class="modal-btn">Зарегистрироваться</button>
    </div>
  </div>
</div>

<div id="gameContainer">
  <div class="userbar">
    <span class="username-badge" id="currentUsername"></span>
    <button class="logout-btn" id="logoutBtn">Выйти</button>
  </div>
  <div class="layout">
    <div class="left">
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Монеты</div><div class="stat-value" id="coins">0</div></div>
        <div class="stat-card"><div class="stat-label">За клик</div><div class="stat-value" id="per-click">1</div></div>
        <div class="stat-card"><div class="stat-label">Всего кликов</div><div class="stat-value" id="total-clicks">0</div></div>
        <div class="stat-card"><div class="stat-label">В секунду</div><div class="stat-value" id="per-sec">0</div></div>
      </div>
      <div class="click-area">
        <button class="click-btn" id="mainBtn">⚡</button>
        <span class="multiplier-badge" id="multiBadge">x?</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">До следующего уровня: 10 кликов</div>
      <div style="width:100%">
        <div class="shop-title" style="margin-bottom:10px">Достижения</div>
        <div class="achievements" id="achievements"></div>
      </div>
    </div>
    <div>
      <div class="shop"><div class="shop-title">🏪 Магазин улучшений</div><div id="shopItems"></div></div>
      <div class="leaderboard">
        <div class="leaderboard-header">
          <div class="shop-title">🏆 Топ игроков</div>
          <button class="refresh-leaderboard" id="refreshLeaderboardBtn">⟳ Обновить</button>
        </div>
        <div class="leaderboard-table" id="leaderboardList">Загрузка...</div>
      </div>
    </div>
  </div>
  <div class="chat-section">
    <div class="chat-box">
      <div class="chat-header">
        <div style="display: flex; gap: 12px; align-items: center;">
          <div class="chat-dot"></div>
          <div class="chat-title">Общий чат</div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Сообщение..." maxlength="200" autocomplete="off">
        <button class="chat-send" id="chatSend">Отправить</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const API_BASE = '/api';
  let token = localStorage.getItem('token') || null;
  let currentUser = null;
  let gameData = null;
  let lastSentScore = -1;
  let sseSource = null;

  // Конфигурация улучшений (полностью из первого варианта)
  const upgrades = [
    { id: 'cursor',  icon: '🖱️', name: 'Курсор',        desc: '+1 за клик',        baseCost: 10,   type: 'click',  value: 1 },
    { id: 'helper',  icon: '👷', name: 'Помощник',       desc: '+1 монета/сек',     baseCost: 50,   type: 'auto',   value: 1 },
    { id: 'factory', icon: '🏭', name: 'Фабрика',        desc: '+5 монет/сек',      baseCost: 300,  type: 'auto',   value: 5 },
    { id: 'mine',    icon: '⛏️', name: 'Шахта',          desc: '+2 за клик',        baseCost: 200,  type: 'click',  value: 2 },
    { id: 'rocket',  icon: '🚀', name: 'Ракета',         desc: '+20 монет/сек',     baseCost: 1500, type: 'auto',   value: 20 },
    { id: 'laser',   icon: '🔬', name: 'Лаборатория',    desc: '+10 за клик',       baseCost: 2000, type: 'click',  value: 10 },
    { id: 'portal',  icon: '🌀', name: 'Портал',         desc: '+100 монет/сек',    baseCost: 8000, type: 'auto',   value: 100 },
  ];

  // Достижения (как в первом варианте)
  const achievementsList = [
    { id: 'click10',    icon: '👆', label: '10 кликов',       check: () => gameData.totalClicks >= 10    },
    { id: 'click100',   icon: '💯', label: '100 кликов',      check: () => gameData.totalClicks >= 100   },
    { id: 'coins100',   icon: '💰', label: '100 монет',        check: () => gameData.coins >= 100         },
    { id: 'coins1k',    icon: '💎', label: '1 000 монет',      check: () => gameData.coins >= 1000        },
    { id: 'coins10k',   icon: '👑', label: '10 000 монет',     check: () => gameData.coins >= 10000       },
    { id: 'upgrade1',   icon: '🔧', label: 'Первое улучшение', check: () => gameData.upgrades.some(u => u > 0) },
    { id: 'allUpg',     icon: '🏆', label: 'Все улучшения',    check: () => gameData.upgrades.every(u => u > 0) },
  ];

  const levels = [10, 50, 200, 500, 2000, 5000, 20000, 100000];

  // Вспомогательные функции
  function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
    return Math.floor(n).toLocaleString();
  }

  function upgradeCost(owned, base) {
    return Math.floor(base * Math.pow(1.15, owned));
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // Запросы с авторизацией
  async function authFetch(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      logout();
      throw new Error('Сессия истекла');
    }
    return res;
  }

  // Сохранить игру на сервер
  async function saveGameToServer() {
    if (!gameData || !token) return;
    try {
      await authFetch(`${API_BASE}/savegame`, {
        method: 'POST',
        body: JSON.stringify({ gameData })
      });
      const currentScore = Math.floor(gameData.coins);
      if (currentScore !== lastSentScore) {
        lastSentScore = currentScore;
        await authFetch(`${API_BASE}/leaderboard/update`, {
          method: 'POST',
          body: JSON.stringify({ score: gameData.coins })
        });
      }
    } catch(e) { console.warn('Save error', e); }
  }

  // Загрузка данных пользователя
  async function loadUserData() {
    try {
      const res = await authFetch(`${API_BASE}/me`);
      const data = await res.json();
      currentUser = data.username;
      gameData = data.gameData;
      document.getElementById('currentUsername').textContent = currentUser;
      // Инициализация структур
      if (!gameData.upgrades) gameData.upgrades = upgrades.map(() => 0);
      if (!gameData.achievements) gameData.achievements = [];
      if (gameData.clickPower === undefined) gameData.clickPower = 1;
      if (gameData.perSecond === undefined) gameData.perSecond = 0;
      if (gameData.totalClicks === undefined) gameData.totalClicks = 0;
      if (gameData.levelIdx === undefined) gameData.levelIdx = 0;
      renderAll();
      checkAchievements(true);
      startGameLoop();
      connectChatSSE();
      fetchLeaderboard();
      setInterval(() => fetchLeaderboard(), 15000);
    } catch(e) {
      showToast('Ошибка загрузки профиля');
      logout();
    }
  }

  // Рендер всей игры
  function renderAll() {
    if (!gameData) return;
    document.getElementById('coins').textContent = fmt(gameData.coins);
    document.getElementById('per-click').textContent = fmt(gameData.clickPower);
    document.getElementById('total-clicks').textContent = fmt(gameData.totalClicks);
    document.getElementById('per-sec').textContent = fmt(gameData.perSecond);
    const target = levels[Math.min(gameData.levelIdx, levels.length - 1)];
    const prev = gameData.levelIdx > 0 ? levels[gameData.levelIdx - 1] : 0;
    const pct = Math.min(((gameData.totalClicks - prev) / (target - prev)) * 100, 100);
    document.getElementById('progressBar').style.width = pct + '%';
    if (gameData.levelIdx >= levels.length) {
      document.getElementById('progressLabel').textContent = 'Максимальный уровень достигнут!';
    } else {
      document.getElementById('progressLabel').textContent = `Уровень ${gameData.levelIdx + 1} — до следующего: ${fmt(target - gameData.totalClicks)} кликов`;
    }
    const multiBadge = document.getElementById('multiBadge');
    if (gameData.clickPower > 1) {
      multiBadge.textContent = `x${gameData.clickPower}`;
      multiBadge.classList.add('visible');
    } else {
      multiBadge.classList.remove('visible');
    }
    renderShop();
  }

  function renderShop() {
    const container = document.getElementById('shopItems');
    container.innerHTML = '';
    upgrades.forEach((u, idx) => {
      const owned = gameData.upgrades[idx] || 0;
      const cost = upgradeCost(owned, u.baseCost);
      const canAfford = gameData.coins >= cost;
      const btn = document.createElement('div');
      btn.className = `upgrade-btn ${canAfford ? 'affordable' : 'disabled'}`;
      btn.dataset.index = idx;
      btn.innerHTML = `
        <span class="upg-icon">${u.icon}</span>
        <span class="upg-info">
          <div class="upg-name">${u.name}</div>
          <div class="upg-desc">${u.desc}</div>
          <div class="upg-cost">💰 ${fmt(cost)}</div>
        </span>
        <span class="upg-count" style="display:${owned > 0 ? 'inline-block' : 'none'}">${owned}</span>
      `;
      btn.onclick = (e) => { e.stopPropagation(); buyUpgrade(idx); };
      container.appendChild(btn);
    });
  }

  function buyUpgrade(idx) {
    const u = upgrades[idx];
    const owned = gameData.upgrades[idx];
    const cost = upgradeCost(owned, u.baseCost);
    if (gameData.coins < cost) return;
    gameData.coins -= cost;
    gameData.upgrades[idx]++;
    if (u.type === 'click') gameData.clickPower += u.value;
    if (u.type === 'auto') gameData.perSecond += u.value;
    renderAll();
    checkAchievements();
    saveGameToServer();
  }

  function handleClick(clientX, clientY) {
    gameData.coins += gameData.clickPower;
    gameData.totalClicks++;
    if (gameData.levelIdx < levels.length && gameData.totalClicks >= levels[gameData.levelIdx]) {
      gameData.levelIdx++;
      showToast(`Уровень ${gameData.levelIdx}! Поздравляем!`);
    }
    renderAll();
    checkAchievements();
    spawnParticle(clientX, clientY, `+${fmt(gameData.clickPower)}`);
    const coinsEl = document.getElementById('coins');
    coinsEl.classList.add('bump');
    setTimeout(() => coinsEl.classList.remove('bump'), 150);
    saveGameToServer();
  }

  function spawnParticle(x, y, text) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = text;
    el.style.left = (x - 20 + Math.random() * 40) + 'px';
    el.style.top = (y - 25) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  let lastTick = performance.now();
  function gameLoop(now) {
    if (!gameData) return requestAnimationFrame(gameLoop);
    const dt = Math.min(0.1, (now - lastTick) / 1000);
    lastTick = now;
    if (gameData.perSecond > 0) {
      gameData.coins += gameData.perSecond * dt;
      renderAll();
      checkAchievements();
      saveGameToServer();
    }
    requestAnimationFrame(gameLoop);
  }
  function startGameLoop() {
    lastTick = performance.now();
    requestAnimationFrame(gameLoop);
  }

  // Достижения
  function renderAchievements() {
    const container = document.getElementById('achievements');
    container.innerHTML = '';
    achievementsList.forEach(ach => {
      const unlocked = gameData.achievements.includes(ach.id);
      const div = document.createElement('div');
      div.className = `achievement ${unlocked ? 'unlocked' : ''}`;
      div.textContent = `${ach.icon} ${ach.label}`;
      container.appendChild(div);
    });
  }

  function checkAchievements(silent = false) {
    let changed = false;
    achievementsList.forEach(ach => {
      if (!gameData.achievements.includes(ach.id) && ach.check()) {
        gameData.achievements.push(ach.id);
        changed = true;
        if (!silent) showToast(`Достижение: ${ach.icon} ${ach.label}`);
      }
    });
    if (changed) {
      renderAchievements();
      saveGameToServer();
    }
  }

  // Чат и лидерборд
  function connectChatSSE() {
    if (sseSource) sseSource.close();
    sseSource = new EventSource(`${API_BASE}/messages/stream`);
    sseSource.onmessage = (e) => {
      try { appendMessage(JSON.parse(e.data)); } catch(e) {}
    };
    sseSource.onerror = () => setTimeout(connectChatSSE, 3000);
    loadMessages();
  }

  async function loadMessages() {
    const res = await fetch(`${API_BASE}/messages`);
    const data = await res.json();
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    (data.messages || []).forEach(m => appendMessage(m, false));
  }

  function appendMessage(msg, scroll = true) {
    const container = document.getElementById('chatMessages');
    const isOwn = msg.username === currentUser;
    const initials = msg.username.slice(0,2).toUpperCase();
    const color = `hsl(${Math.abs(msg.username.split('').reduce((a,b)=>a+b.charCodeAt(0),0) % 360)}, 65%, 52%)`;
    const div = document.createElement('div');
    div.className = `chat-msg ${isOwn ? 'own' : ''}`;
    div.innerHTML = `
      <div class="chat-avatar" style="background:${color}">${initials}</div>
      <div class="chat-bubble-wrap">
        <div class="chat-meta">${escapeHtml(msg.username)} · ${new Date(msg.createdAt).toLocaleTimeString()}</div>
        <div class="chat-bubble">${escapeHtml(msg.text)}</div>
      </div>
    `;
    container.appendChild(div);
    if (scroll) container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    try {
      await authFetch(`${API_BASE}/messages`, {
        method: 'POST',
        body: JSON.stringify({ text })
      });
    } catch(e) { showToast('Ошибка отправки'); input.value = text; }
  }

  async function fetchLeaderboard() {
    const res = await fetch(`${API_BASE}/leaderboard`);
    const data = await res.json();
    const container = document.getElementById('leaderboardList');
    if (!data.leaderboard || data.leaderboard.length === 0) {
      container.innerHTML = '<div class="leaderboard-empty">Пока никого нет. Стань первым! 🏆</div>';
      return;
    }
    container.innerHTML = data.leaderboard.map((entry, idx) => {
      let medal = '';
      if (idx === 0) medal = '🥇 ';
      else if (idx === 1) medal = '🥈 ';
      else if (idx === 2) medal = '🥉 ';
      return `
        <div class="leaderboard-row">
          <div class="leaderboard-rank">${medal || (idx+1)}</div>
          <div class="leaderboard-name" title="${escapeHtml(entry.username)}">${escapeHtml(entry.username)}</div>
          <div class="leaderboard-score">💰 ${fmt(entry.score)}</div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
  }

  // Авторизация
  async function login(username, password) {
    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('gameContainer').style.display = 'block';
        await loadUserData();
        return true;
      } else {
        document.getElementById('loginError').innerText = data.error;
        return false;
      }
    } catch(e) { document.getElementById('loginError').innerText = 'Ошибка сети'; return false; }
  }

  async function register(username, password) {
    try {
      const res = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Регистрация успешна! Теперь войдите');
        document.querySelector('.auth-tab[data-tab="login"]').click();
        return true;
      } else {
        document.getElementById('regError').innerText = data.error;
        return false;
      }
    } catch(e) { document.getElementById('regError').innerText = 'Ошибка'; return false; }
  }

  function logout() {
    token = null;
    localStorage.removeItem('token');
    currentUser = null;
    gameData = null;
    if (sseSource) sseSource.close();
    document.getElementById('gameContainer').style.display = 'none';
    document.getElementById('authModal').classList.add('active');
  }

  // Переключение вкладок
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const form = tab.dataset.tab === 'login' ? 'loginForm' : 'registerForm';
      document.getElementById('loginForm').style.display = form === 'loginForm' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = form === 'registerForm' ? 'block' : 'none';
    });
  });
  document.getElementById('doLogin').onclick = () => login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
  document.getElementById('doRegister').onclick = () => register(document.getElementById('regUsername').value, document.getElementById('regPassword').value);
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('mainBtn').onclick = (e) => handleClick(e.clientX, e.clientY);
  document.getElementById('chatSend').onclick = sendMessage;
  document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  document.getElementById('refreshLeaderboardBtn').onclick = fetchLeaderboard;

  // Автоматический вход по токену
  if (token) {
    (async () => {
      try {
        const res = await authFetch(`${API_BASE}/me`);
        if (res.ok) {
          document.getElementById('authModal').classList.remove('active');
          document.getElementById('gameContainer').style.display = 'block';
          await loadUserData();
        } else logout();
      } catch(e) { logout(); }
    })();
  }
</script>
</body>
</html>
