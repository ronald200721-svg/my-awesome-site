<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Кликер | Регистрация и Лидеры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --surface2:  #1e2a3a;
      --border:    #1f3050;
      --primary:   #3b82f6;
      --primary-d: #2563eb;
      --accent:    #f59e0b;
      --accent-d:  #d97706;
      --success:   #10b981;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --glow:      rgba(59,130,246,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-x pan-y;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,.5) 0%, transparent 100%),
                  radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
                  radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
                  radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Модальное окно */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
      width: min(360px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-content h2 {
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .modal-content p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--primary); }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-btn {
      flex: 1;
      background: var(--primary);
      border: none;
      border-radius: 40px;
      padding: 10px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.1s;
    }
    .modal-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
    }
    .modal-btn:hover { opacity: 0.8; }
    .error-msg {
      color: #f87171;
      font-size: 0.75rem;
      margin-top: -10px;
      margin-bottom: 12px;
    }

    /* Игровой интерфейс (скрыт до входа) */
    #gameContainer {
      width: 100%;
      max-width: 1200px;
      display: none;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    @media (max-width: 850px) {
      .layout { grid-template-columns: 1fr; }
    }
    .left { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
    }
    .stat-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 1.5rem; font-weight: 900; transition: transform 0.1s; }
    .stat-value.bump { transform: scale(1.15); color: var(--accent); }
    .click-btn {
      width: 200px; height: 200px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 35% 35%, #4fa3ff, var(--primary-d));
      box-shadow: 0 0 0 8px rgba(59,130,246,.15), 0 0 0 16px rgba(59,130,246,.08), 0 20px 60px rgba(59,130,246,.35);
      font-size: 4rem;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
      position: relative;
      overflow: hidden;
    }
    .click-btn:active { transform: scale(0.92); }
    .click-btn:hover:not(:active) { transform: scale(1.04); }
    .progress-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }
    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.3s;
    }
    .shop, .leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
    }
    .shop-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .upgrade-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.1s;
    }
    .upgrade-btn.disabled { opacity: 0.45; cursor: not-allowed; }
    .upgrade-btn.affordable { border-color: var(--primary); }
    .upg-icon { font-size: 1.5rem; }
    .upg-info { flex: 1; }
    .upg-name { font-weight: 700; font-size: 0.85rem; }
    .upg-cost { font-size: 0.7rem; color: var(--accent); }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .userbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }
    .username-badge {
      background: var(--primary);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s;
    }
    .logout-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Чат */
    .chat-section {
      width: 100%;
      max-width: 1200px;
      margin-top: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }
    .chat-messages {
      height: 260px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .chat-msg.own {
      flex-direction: row-reverse;
    }
    .chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
    }
    .chat-bubble {
      background: var(--surface2);
      border-radius: 12px;
      padding: 6px 12px;
      max-width: 70%;
      word-break: break-word;
    }
    .chat-msg.own .chat-bubble {
      background: rgba(59,130,246,0.2);
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
    }
    .chat-send {
      background: var(--primary);
      border: none;
      border-radius: 12px;
      padding: 8px 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 8px 16px;
      transition: 0.2s;
      z-index: 1100;
      font-size: 0.85rem;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .chat-empty {
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    /* Анимация частиц */
    @keyframes float-up {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
    }
    .particle {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      font-weight: 900;
      text-shadow: 0 0 4px black;
      animation: float-up 0.8s ease forwards;
    }
  </style>
</head>
<body>

<!-- Модальное окно входа / регистрации -->
<div id="authModal" class="modal active">
  <div class="modal-content">
    <h2>Добро пожаловать</h2>
    <p>Войдите или зарегистрируйтесь, чтобы играть</p>
    <div id="authTabs" style="display: flex; gap: 12px; margin-bottom: 20px;">
      <button id="tabLogin" class="modal-btn" style="background: var(--primary);">Вход</button>
      <button id="tabRegister" class="modal-btn secondary">Регистрация</button>
    </div>
    <div id="loginForm">
      <input type="text" id="loginUsername" class="modal-input" placeholder="Имя пользователя" autocomplete="off">
      <input type="password" id="loginPassword" class="modal-input" placeholder="Пароль">
      <div id="loginError" class="error-msg"></div>
      <button id="doLogin" class="modal-btn">Войти</button>
    </div>
    <div id="registerForm" style="display: none;">
      <input type="text" id="regUsername" class="modal-input" placeholder="Имя (3-30 символов)" autocomplete="off">
      <input type="password" id="regPassword" class="modal-input" placeholder="Пароль (мин. 4)">
      <div id="regError" class="error-msg"></div>
      <button id="doRegister" class="modal-btn">Зарегистрироваться</button>
    </div>
  </div>
</div>

<div id="gameContainer">
  <div class="userbar">
    <span class="username-badge" id="currentUsername"></span>
    <button class="logout-btn" id="logoutBtn">Выйти</button>
  </div>
  <div class="layout">
    <div class="left">
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Монеты</div><div class="stat-value" id="coins">0</div></div>
        <div class="stat-card"><div class="stat-label">За клик</div><div class="stat-value" id="per-click">1</div></div>
        <div class="stat-card"><div class="stat-label">Всего кликов</div><div class="stat-value" id="total-clicks">0</div></div>
        <div class="stat-card"><div class="stat-label">В секунду</div><div class="stat-value" id="per-sec">0</div></div>
      </div>
      <button class="click-btn" id="mainBtn">⚡</button>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>
    <div>
      <div class="shop"><div class="shop-title">🏪 Магазин</div><div id="shopItems"></div></div>
      <div class="leaderboard" style="margin-top: 20px;"><div class="shop-title">🏆 Топ игроков</div><div id="leaderboardList">Загрузка...</div></div>
    </div>
  </div>
  <div class="chat-section">
    <div class="chat-header"><span>💬 Общий чат</span></div>
    <div class="chat-messages" id="chatMessages"><div class="chat-empty">Сообщений пока нет</div></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Сообщение..." maxlength="200">
      <button class="chat-send" id="chatSend">→</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const API_BASE = '/api';
  let token = localStorage.getItem('token') || null;
  let currentUser = null;
  let gameData = null;
  let lastSentScore = -1;
  let sseSource = null;

  // Конфиг улучшений (соответствует серверной части)
  const upgrades = [
    { id: 'cursor',  icon: '🖱️', name: 'Курсор', desc: '+1 за клик', baseCost: 10,   type: 'click', value: 1 },
    { id: 'helper',  icon: '👷', name: 'Помощник', desc: '+1/сек',   baseCost: 50,   type: 'auto',  value: 1 },
    { id: 'factory', icon: '🏭', name: 'Фабрика', desc: '+5/сек',    baseCost: 300,  type: 'auto',  value: 5 },
    { id: 'mine',    icon: '⛏️', name: 'Шахта',   desc: '+2 за клик', baseCost: 200,  type: 'click', value: 2 },
    { id: 'rocket',  icon: '🚀', name: 'Ракета',  desc: '+20/сек',   baseCost: 1500, type: 'auto',  value: 20 },
    { id: 'laser',   icon: '🔬', name: 'Лаборатория', desc: '+10 за клик', baseCost: 2000, type: 'click', value: 10 },
    { id: 'portal',  icon: '🌀', name: 'Портал',  desc: '+100/сек',  baseCost: 8000, type: 'auto',  value: 100 }
  ];

  function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return Math.floor(n).toLocaleString();
  }

  function upgradeCost(owned, base) {
    return Math.floor(base * Math.pow(1.15, owned));
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Запросы с авторизацией
  async function authFetch(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      logout();
      throw new Error('Сессия истекла');
    }
    return res;
  }

  // Сохранить игру на сервер
  async function saveGameToServer() {
    if (!gameData || !token) return;
    try {
      await authFetch(`${API_BASE}/savegame`, {
        method: 'POST',
        body: JSON.stringify({ gameData })
      });
      if (Math.floor(gameData.coins) !== lastSentScore) {
        lastSentScore = Math.floor(gameData.coins);
        await authFetch(`${API_BASE}/leaderboard/update`, {
          method: 'POST',
          body: JSON.stringify({ score: gameData.coins })
        });
      }
    } catch(e) { console.warn('save error', e); }
  }

  // Загрузка данных пользователя после входа
  async function loadUserData() {
    try {
      const res = await authFetch(`${API_BASE}/me`);
      const data = await res.json();
      currentUser = data.username;
      gameData = data.gameData;
      document.getElementById('currentUsername').textContent = currentUser;
      if (!gameData.upgrades) gameData.upgrades = upgrades.map(() => 0);
      if (!gameData.achievements) gameData.achievements = [];
      renderAll();
      startGameLoop();
      connectChatSSE();
      fetchLeaderboard();
    } catch(e) {
      showToast('Ошибка загрузки профиля');
      logout();
    }
  }

  // Рендер всей игры
  function renderAll() {
    if (!gameData) return;
    document.getElementById('coins').textContent = fmt(gameData.coins);
    document.getElementById('per-click').textContent = fmt(gameData.clickPower);
    document.getElementById('total-clicks').textContent = fmt(gameData.totalClicks);
    document.getElementById('per-sec').textContent = fmt(gameData.perSecond);
    const levels = [10,50,200,500,2000,5000,20000,100000];
    let levelIdx = gameData.levelIdx || 0;
    const target = levels[Math.min(levelIdx, levels.length-1)];
    const prev = levelIdx > 0 ? levels[levelIdx-1] : 0;
    const pct = Math.min(((gameData.totalClicks - prev) / (target - prev)) * 100, 100);
    document.getElementById('progressBar').style.width = pct + '%';
    renderShop();
  }

  function renderShop() {
    const container = document.getElementById('shopItems');
    container.innerHTML = '';
    upgrades.forEach((u, idx) => {
      const owned = gameData.upgrades[idx] || 0;
      const cost = upgradeCost(owned, u.baseCost);
      const canAfford = gameData.coins >= cost;
      const btn = document.createElement('div');
      btn.className = `upgrade-btn ${canAfford ? 'affordable' : 'disabled'}`;
      btn.innerHTML = `
        <div class="upg-icon">${u.icon}</div>
        <div class="upg-info">
          <div class="upg-name">${u.name}</div>
          <div class="upg-cost">💰 ${fmt(cost)}</div>
        </div>
        <div>${owned > 0 ? owned : ''}</div>
      `;
      btn.onclick = () => buyUpgrade(idx);
      container.appendChild(btn);
    });
  }

  function buyUpgrade(idx) {
    const u = upgrades[idx];
    const owned = gameData.upgrades[idx];
    const cost = upgradeCost(owned, u.baseCost);
    if (gameData.coins < cost) return;
    gameData.coins -= cost;
    gameData.upgrades[idx]++;
    if (u.type === 'click') gameData.clickPower += u.value;
    if (u.type === 'auto') gameData.perSecond += u.value;
    renderAll();
    saveGameToServer();
  }

  function handleClick(clientX, clientY) {
    gameData.coins += gameData.clickPower;
    gameData.totalClicks++;
    const levels = [10,50,200,500,2000,5000,20000,100000];
    if (gameData.levelIdx < levels.length && gameData.totalClicks >= levels[gameData.levelIdx]) {
      gameData.levelIdx++;
      showToast(`Уровень ${gameData.levelIdx}!`);
    }
    renderAll();
    saveGameToServer();
    spawnParticle(clientX, clientY, `+${fmt(gameData.clickPower)}`);
    const coinsEl = document.getElementById('coins');
    coinsEl.classList.add('bump');
    setTimeout(() => coinsEl.classList.remove('bump'), 150);
  }

  function spawnParticle(x, y, text) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = text;
    el.style.left = (x - 20 + Math.random() * 40) + 'px';
    el.style.top = (y - 20) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  let lastTick = performance.now();
  function gameLoop(now) {
    if (!gameData) return requestAnimationFrame(gameLoop);
    const dt = Math.min(0.1, (now - lastTick) / 1000);
    lastTick = now;
    if (gameData.perSecond > 0) {
      gameData.coins += gameData.perSecond * dt;
      renderAll();
      saveGameToServer();
    }
    requestAnimationFrame(gameLoop);
  }

  function startGameLoop() {
    lastTick = performance.now();
    requestAnimationFrame(gameLoop);
  }

  // Чат
  function connectChatSSE() {
    if (sseSource) sseSource.close();
    sseSource = new EventSource(`${API_BASE}/messages/stream`);
    sseSource.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      appendMessage(msg);
    };
    sseSource.onerror = () => setTimeout(connectChatSSE, 5000);
    loadMessages();
  }

  async function loadMessages() {
    const res = await fetch(`${API_BASE}/messages`);
    const data = await res.json();
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    (data.messages || []).forEach(m => appendMessage(m, false));
  }

  function appendMessage(msg, scroll = true) {
    const container = document.getElementById('chatMessages');
    const emptyDiv = container.querySelector('.chat-empty');
    if (emptyDiv) emptyDiv.remove();
    const isOwn = msg.username === currentUser;
    const div = document.createElement('div');
    div.className = `chat-msg ${isOwn ? 'own' : ''}`;
    const initials = msg.username.slice(0,2).toUpperCase();
    div.innerHTML = `
      <div class="chat-avatar">${initials}</div>
      <div class="chat-bubble"><strong>${escapeHtml(msg.username)}</strong><br>${escapeHtml(msg.text)}<br><span style="font-size:10px;color:#aaa;">${new Date(msg.createdAt).toLocaleTimeString()}</span></div>
    `;
    container.appendChild(div);
    if (scroll) container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    try {
      await authFetch(`${API_BASE}/messages`, {
        method: 'POST',
        body: JSON.stringify({ text })
      });
    } catch(e) { showToast('Ошибка отправки'); input.value = text; }
  }

  async function fetchLeaderboard() {
    const res = await fetch(`${API_BASE}/leaderboard`);
    const data = await res.json();
    const container = document.getElementById('leaderboardList');
    if (!data.leaderboard.length) { container.innerHTML = 'Пока никого нет'; return; }
    container.innerHTML = data.leaderboard.map((l, i) => `
      <div class="leaderboard-row">
        <span>${i+1}. ${escapeHtml(l.username)}</span>
        <span>💰 ${fmt(l.score)}</span>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m){
      if(m==='&') return '&amp;';
      if(m==='<') return '&lt;';
      if(m==='>') return '&gt;';
      return m;
    });
  }

  // Авторизация
  async function login(username, password) {
    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('gameContainer').style.display = 'block';
        await loadUserData();
        setInterval(() => fetchLeaderboard(), 15000);
        return true;
      } else {
        document.getElementById('loginError').innerText = data.error;
        return false;
      }
    } catch(e) { document.getElementById('loginError').innerText = 'Ошибка сети'; return false; }
  }

  async function register(username, password) {
    try {
      const res = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Регистрация успешна! Теперь войдите');
        document.getElementById('tabLogin').click();
        return true;
      } else {
        document.getElementById('regError').innerText = data.error;
        return false;
      }
    } catch(e) { document.getElementById('regError').innerText = 'Ошибка'; return false; }
  }

  function logout() {
    token = null;
    localStorage.removeItem('token');
    currentUser = null;
    gameData = null;
    if (sseSource) sseSource.close();
    document.getElementById('gameContainer').style.display = 'none';
    document.getElementById('authModal').classList.add('active');
  }

  // Переключение вкладок
  document.getElementById('tabLogin').onclick = () => {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('tabLogin').style.background = 'var(--primary)';
    document.getElementById('tabRegister').style.background = 'transparent';
  };
  document.getElementById('tabRegister').onclick = () => {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('tabRegister').style.background = 'var(--primary)';
    document.getElementById('tabLogin').style.background = 'transparent';
  };
  document.getElementById('doLogin').onclick = () => login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
  document.getElementById('doRegister').onclick = () => register(document.getElementById('regUsername').value, document.getElementById('regPassword').value);
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('mainBtn').onclick = (e) => handleClick(e.clientX, e.clientY);
  document.getElementById('chatSend').onclick = sendMessage;
  document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

  // Проверка токена при загрузке
  if (token) {
    (async () => {
      try {
        const res = await authFetch(`${API_BASE}/me`);
        if (res.ok) {
          document.getElementById('authModal').classList.remove('active');
          document.getElementById('gameContainer').style.display = 'block';
          await loadUserData();
          setInterval(() => fetchLeaderboard(), 15000);
        } else logout();
      } catch(e) { logout(); }
    })();
  }
</script>
</body>
</html>
