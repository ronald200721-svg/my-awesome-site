<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYclicker - Pro Edition</title>
    <style>
        :root {
            --accent-color: #ff4757;
            --bg-dark: rgba(30, 34, 39, 0.85);
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            font-family: 'Arial', sans-serif;
            color: var(--text-light);
            user-select: none;
            overflow: hidden;
            /* Фоновое изображение из предыдущего запроса */
            background: url('https://avatars.mds.yandex.net/i?id=7a22116bf62b50356500473e4f9a8895_l-5094289-images-thumbs&n=13') no-repeat center center fixed;
            background-size: cover;
        }

        /* HUD панель */
        .hud {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 0 0 20px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 90%;
            max-width: 500px;
        }

        #score-container {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 16px;
            opacity: 0.9;
        }

        /* Контейнер с картинкой-кнопкой */
        .click-area-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container {
            position: relative;
            display: inline-block;
            transition: transform 0.05s ease; /* Быстрая реакция на клик */
            cursor: pointer;
        }

        .img-container:active {
            transform: scale(0.92);
        }

        img {
            width: 280px; 
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 40px rgba(255, 71, 87, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.2);
            -webkit-user-drag: none;
            pointer-events: none; 
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 5;
        }

        /* Всплывающий текст */
        .floating-text {
            position: absolute;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.7s ease-out forwards;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        /* Апгрейды */
        .upgrades {
            background: var(--bg-dark);
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-sizing: border-box;
        }

        .upgrade-btn {
            background: #2f3542;
            color: white;
            border: 1px solid #57606f;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            max-width: 200px;
            transition: 0.2s;
        }

        .upgrade-btn:disabled {
            opacity: 0.4;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .upgrade-btn b { display: block; font-size: 14px; }
        .cost { color: #f1c40f; font-size: 13px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="hud">
        <div id="score-container">0</div>
        <div class="stats">
            <div>Клик: <span id="power-val">1</span></div>
            <div>Пассив: <span id="passive-val">0</span>/с</div>
        </div>
    </div>

    <div class="click-area-container">
        <div class="img-container" id="click-area">
            <div class="overlay"></div>
            <img src="https://pic.rutubelist.ru/user/35/4f/354fef426e58b253e4a6a998cf6271b4.jpg" alt="Кликер">
        </div>
    </div>

    <div class="upgrades">
        <button class="upgrade-btn" id="upg-click" disabled>
            <b>Сила клика +1</b>
            <span class="cost">Цена: <span id="cost-click">10</span></span>
        </button>
        <button class="upgrade-btn" id="upg-auto" disabled>
            <b>Автоклик +1/с</b>
            <span class="cost">Цена: <span id="cost-auto">50</span></span>
        </button>
    </div>

    <script>
        let score = 0;
        let clickPower = 1;
        let autoPower = 0;
        
        let costClick = 10;
        let costAuto = 50;

        const scoreEl = document.getElementById('score-container');
        const clickArea = document.getElementById('click-area');
        
        // Предзагрузка звука
        const audioSrc = "https://www.myinstants.com/media/sounds/mouse-click.mp3";
        const mainAudio = new Audio(audioSrc);
        mainAudio.preload = "auto";

        // Функция проигрывания БЕЗ задержки
        function playClickSound() {
            const sound = mainAudio.cloneNode(); // Клонируем для возможности быстрого наложения звуков
            sound.volume = 0.6;
            sound.play();
        }

        function updateUI() {
            scoreEl.textContent = Math.floor(score);
            document.getElementById('power-val').textContent = clickPower;
            document.getElementById('passive-val').textContent = autoPower;
            
            document.getElementById('cost-click').textContent = costClick;
            document.getElementById('cost-auto').textContent = costAuto;

            document.getElementById('upg-click').disabled = score < costClick;
            document.getElementById('upg-auto').disabled = score < costAuto;
        }

        // Клик по картинке
        clickArea.addEventListener('pointerdown', (e) => {
            score += clickPower;
            playClickSound();
            createFloatingText(e.clientX, e.clientY);
            updateUI();
        });

        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.textContent = `+${clickPower}`;
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 40}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 700);
        }

        // Покупка силы клика
        document.getElementById('upg-click').onclick = () => {
            if(score >= costClick) {
                score -= costClick;
                clickPower++;
                costClick = Math.round(costClick * 1.6);
                updateUI();
            }
        };

        // Покупка автокликера
        document.getElementById('upg-auto').onclick = () => {
            if(score >= costAuto) {
                score -= costAuto;
                autoPower++;
                costAuto = Math.round(costAuto * 1.8);
                updateUI();
            }
        };

        // Пассивный доход
        setInterval(() => {
            if(autoPower > 0) {
                score += autoPower;
                updateUI();
            }
        }, 1000);

        // Защита от контекстного меню и клавиш
        document.onkeydown = (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && [67, 86, 85, 83].includes(e.keyCode))) return false;
        };

        updateUI();
    </script>
</body>
</html>
