<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Защищенная картинка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            /* Запрещаем выделение текста на всей странице */
            user-select: none;
        }

        .img-container {
            position: relative;
            display: inline-block;
        }

        img {
            width: 300px; 
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 5px solid white;
            
            /* Запрещаем перетаскивание картинки мышкой */
            -webkit-user-drag: none;
            pointer-events: none; 
        }

        /* Создаем невидимый слой поверх картинки для доп. защиты */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 5;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="img-container">
        <div class="overlay"></div> <img src="https://pic.rutubelist.ru/user/35/4f/354fef426e58b253e4a6a998cf6271b4.jpg" alt="Защищенное фото">
    </div>

    <script>
        // Дополнительная блокировка горячих клавиш (Ctrl+S, Ctrl+U, F12)
        document.onkeydown = function(e) {
            if (e.ctrlKey && 
                (e.keyCode === 67 || 
                 e.keyCode === 86 || 
                 e.keyCode === 85 || 
                 e.keyCode === 83)) {
                return false;
            } else if (e.keyCode === 123) {
                return false;
            }
        };
    </script>

</body>
</html>
